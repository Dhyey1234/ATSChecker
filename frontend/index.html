<!DOCTYPE html>
<html>
<head>
    <title>ATS Checker</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        textarea { width: 100%; height: 120px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
        .box { margin-top: 20px; padding: 15px; border: 1px solid #ccc; }
    </style>
</head>

<body>

<h2>ATS Resume Checker</h2>

<h3>Job Description</h3>
<textarea id="jd"></textarea>

<h3>Resume</h3>
<textarea id="resume"></textarea>

<button onclick="analyze()">Analyze</button>

<div class="box" id="output"></div>

<script>
async function analyze() {

    const jd = document.getElementById("jd").value;
    const resume = document.getElementById("resume").value;

    try {
        const res = await fetch("http://localhost:8080/api/ats/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                jobDescription: jd,
                resume: resume
            })
        });

        const data = await res.json();

        if (!res.ok) {
            document.getElementById("output").innerHTML =
                "<p style='color:red;'>Error: " + (data.message || "Backend failed") + "</p>";
            return;
        }

        const matched = data.matched || [];
        const missing = data.missing || [];
        const suggestions = data.suggestions || [];

        document.getElementById("output").innerHTML = `
            <h3>Score: ${data.score || 0}/100</h3>

            <h4>Matched</h4>
            <p>${matched.join(", ")}</p>

            <h4>Missing</h4>
            <p>${missing.join(", ")}</p>

            <h4>Suggestions</h4>
            <p>${suggestions.join("<br>")}</p>
        `;

    } catch (error) {
        document.getElementById("output").innerHTML =
            "<p style='color:red;'>Connection error. Backend not running.</p>";
        console.error(error);
    }
}
</script>

</body>
</html>
